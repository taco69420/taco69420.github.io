<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="900" height="420" fill="#f5f0e8"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="40" fill="#2d5a27"/>
  <text x="450" y="26" text-anchor="middle" fill="#f5f0e8" font-size="15" font-weight="bold" letter-spacing="1">HOW TO SET GOPHER TRAPS — NO OPEN MOUNDS METHOD</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 1 — PROBE -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Step label -->
  <rect x="10" y="48" width="280" height="24" fill="#2d5a27" rx="3"/>
  <text x="150" y="64" text-anchor="middle" fill="#f5f0e8" font-size="12" font-weight="bold">STEP 1 — PROBE THE SURFACE</text>

  <!-- Sky -->
  <rect x="10" y="72" width="280" height="50" fill="#c8dfc4"/>

  <!-- Grass strip -->
  <rect x="10" y="118" width="280" height="10" fill="#4a7c3f"/>
  <!-- Grass tufts -->
  <g fill="#3a6b30">
    <ellipse cx="30" cy="118" rx="8" ry="4"/>
    <ellipse cx="55" cy="116" rx="7" ry="4"/>
    <ellipse cx="80" cy="119" rx="9" ry="4"/>
    <ellipse cx="110" cy="117" rx="7" ry="3"/>
    <ellipse cx="200" cy="118" rx="8" ry="4"/>
    <ellipse cx="230" cy="116" rx="7" ry="4"/>
    <ellipse cx="260" cy="119" rx="8" ry="3"/>
  </g>

  <!-- Mound (left, closed) -->
  <ellipse cx="90" cy="118" rx="45" ry="12" fill="#8B6914"/>
  <path d="M 50 118 Q 90 96 130 118" fill="#a07820" stroke="#7a5c10" stroke-width="1"/>

  <!-- Soil layer -->
  <rect x="10" y="128" width="280" height="130" fill="#8B5E3C"/>
  <!-- Soil texture dots -->
  <g fill="#7a5030" opacity="0.4">
    <circle cx="30" cy="145" r="2"/><circle cx="70" cy="160" r="2"/><circle cx="110" cy="142" r="2"/>
    <circle cx="150" cy="155" r="2"/><circle cx="190" cy="148" r="2"/><circle cx="230" cy="165" r="2"/>
    <circle cx="265" cy="145" r="2"/><circle cx="45" cy="175" r="2"/><circle cx="85" cy="190" r="2"/>
    <circle cx="135" cy="178" r="2"/><circle cx="175" cy="195" r="2"/><circle cx="215" cy="180" r="2"/>
    <circle cx="255" cy="170" r="2"/>
  </g>

  <!-- Main tunnel run -->
  <rect x="10" y="228" width="280" height="18" fill="#2a1a0a"/>
  <rect x="10" y="229" width="280" height="6" fill="#3d2510" opacity="0.5"/>

  <!-- Rebar probe -->
  <line x1="150" y1="80" x2="150" y2="237" stroke="#888" stroke-width="4"/>
  <!-- Rebar grip marks -->
  <g stroke="#aaa" stroke-width="1.5">
    <line x1="145" y1="100" x2="155" y2="100"/>
    <line x1="145" y1="115" x2="155" y2="115"/>
    <line x1="145" y1="130" x2="155" y2="130"/>
    <line x1="145" y1="145" x2="155" y2="145"/>
    <line x1="145" y1="160" x2="155" y2="160"/>
    <line x1="145" y1="175" x2="155" y2="175"/>
    <line x1="145" y1="190" x2="155" y2="190"/>
    <line x1="145" y1="205" x2="155" y2="205"/>
    <line x1="145" y1="220" x2="155" y2="220"/>
  </g>
  <!-- Arrow on probe tip -->
  <polygon points="150,240 145,228 155,228" fill="#666"/>

  <!-- Labels -->
  <text x="90" y="105" text-anchor="middle" fill="#1a3a16" font-size="10" font-weight="bold">Mound</text>
  <line x1="90" y1="107" x2="90" y2="115" stroke="#1a3a16" stroke-width="1"/>

  <text x="195" y="92" text-anchor="start" fill="#1a3a16" font-size="10" font-weight="bold">Rebar probe</text>
  <line x1="193" y1="93" x2="158" y2="110" stroke="#1a3a16" stroke-width="1"/>

  <!-- Dotted line showing tunnel path -->
  <line x1="10" y1="237" x2="280" y2="237" stroke="#f5c842" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Caption -->
  <rect x="10" y="258" width="280" height="32" fill="#2d5a27" rx="0"/>
  <text x="150" y="271" text-anchor="middle" fill="#f5f0e8" font-size="10">Probe from the surface —</text>
  <text x="150" y="284" text-anchor="middle" fill="#f5f0e8" font-size="10">don't open the mound.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 2 — DIG HOLE + SET TRAPS -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="310" y="48" width="280" height="24" fill="#2d5a27" rx="3"/>
  <text x="450" y="64" text-anchor="middle" fill="#f5f0e8" font-size="12" font-weight="bold">STEP 2 — DIG HOLE TO MAIN RUN</text>

  <!-- Sky -->
  <rect x="310" y="72" width="280" height="50" fill="#c8dfc4"/>

  <!-- Grass strip -->
  <rect x="310" y="118" width="280" height="10" fill="#4a7c3f"/>
  <g fill="#3a6b30">
    <ellipse cx="330" cy="118" rx="8" ry="4"/>
    <ellipse cx="360" cy="116" rx="7" ry="4"/>
    <ellipse cx="430" cy="119" rx="9" ry="4"/>
    <ellipse cx="510" cy="117" rx="7" ry="3"/>
    <ellipse cx="540" cy="118" rx="8" ry="4"/>
    <ellipse cx="570" cy="116" rx="7" ry="4"/>
  </g>

  <!-- Soil -->
  <rect x="310" y="128" width="280" height="130" fill="#8B5E3C"/>
  <g fill="#7a5030" opacity="0.4">
    <circle cx="330" cy="145" r="2"/><circle cx="370" cy="160" r="2"/><circle cx="420" cy="155" r="2"/>
    <circle cx="480" cy="148" r="2"/><circle cx="530" cy="165" r="2"/><circle cx="565" cy="145" r="2"/>
    <circle cx="345" cy="180" r="2"/><circle cx="395" cy="195" r="2"/><circle cx="455" cy="178" r="2"/>
    <circle cx="515" cy="185" r="2"/><circle cx="555" cy="175" r="2"/>
  </g>

  <!-- Open hole cut through soil -->
  <rect x="432" y="118" width="36" height="112" fill="#2a1a0a"/>
  <!-- Hole walls shading -->
  <rect x="432" y="118" width="6" height="112" fill="#1a0e05" opacity="0.6"/>
  <rect x="462" y="118" width="6" height="112" fill="#1a0e05" opacity="0.3"/>

  <!-- Main tunnel run -->
  <rect x="310" y="228" width="280" height="18" fill="#2a1a0a"/>

  <!-- Tunnel extends through hole -->
  <rect x="310" y="228" width="122" height="18" fill="#2a1a0a"/>
  <rect x="468" y="228" width="122" height="18" fill="#2a1a0a"/>

  <!-- Victor Traps back to back in tunnel -->
  <!-- Left trap (facing left) -->
  <g transform="translate(380, 232)">
    <!-- trap body -->
    <rect x="-28" y="0" width="28" height="8" fill="#c0392b" rx="1"/>
    <!-- spring coil -->
    <circle cx="-14" cy="4" r="5" fill="none" stroke="#888" stroke-width="2"/>
    <!-- pincer arms -->
    <line x1="-28" y1="0" x2="-38" y2="-6" stroke="#888" stroke-width="2.5"/>
    <line x1="-28" y1="8" x2="-38" y2="14" stroke="#888" stroke-width="2.5"/>
    <!-- trigger plate -->
    <rect x="-5" y="2" width="5" height="4" fill="#f39c12"/>
  </g>

  <!-- Right trap (facing right) -->
  <g transform="translate(520, 232)">
    <rect x="0" y="0" width="28" height="8" fill="#c0392b" rx="1"/>
    <circle cx="14" cy="4" r="5" fill="none" stroke="#888" stroke-width="2"/>
    <line x1="28" y1="0" x2="38" y2="-6" stroke="#888" stroke-width="2.5"/>
    <line x1="28" y1="8" x2="38" y2="14" stroke="#888" stroke-width="2.5"/>
    <rect x="0" y="2" width="5" height="4" fill="#f39c12"/>
  </g>

  <!-- Wire connecting traps -->
  <line x1="380" y1="236" x2="520" y2="236" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Arrows showing trap directions -->
  <text x="370" y="222" text-anchor="middle" fill="#f5c842" font-size="14">←</text>
  <text x="530" y="222" text-anchor="middle" fill="#f5c842" font-size="14">→</text>

  <!-- Label: hole to dig to find main run -->
  <line x1="450" y1="95" x2="450" y2="118" stroke="#1a3a16" stroke-width="1"/>
  <text x="450" y="86" text-anchor="middle" fill="#1a3a16" font-size="9.5" font-weight="bold">Hole to dig to</text>
  <text x="450" y="97" text-anchor="middle" fill="#1a3a16" font-size="9.5" font-weight="bold">find main run</text>

  <!-- Caption -->
  <rect x="310" y="258" width="280" height="32" fill="#2d5a27"/>
  <text x="450" y="271" text-anchor="middle" fill="#f5f0e8" font-size="10">Dig straight down into the run.</text>
  <text x="450" y="284" text-anchor="middle" fill="#f5f0e8" font-size="10">Set traps back-to-back — facing both ways.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- STEP 3 — MOUND STAYS CLOSED -->
  <!-- ═══════════════════════════════════════════════ -->

  <rect x="610" y="48" width="280" height="24" fill="#2d5a27" rx="3"/>
  <text x="750" y="64" text-anchor="middle" fill="#f5f0e8" font-size="12" font-weight="bold">STEP 3 — MOUND STAYS CLOSED</text>

  <!-- Sky -->
  <rect x="610" y="72" width="280" height="50" fill="#c8dfc4"/>

  <!-- Grass strip -->
  <rect x="610" y="118" width="280" height="10" fill="#4a7c3f"/>
  <g fill="#3a6b30">
    <ellipse cx="630" cy="118" rx="8" ry="4"/>
    <ellipse cx="660" cy="116" rx="7" ry="4"/>
    <ellipse cx="700" cy="119" rx="9" ry="4"/>
    <ellipse cx="800" cy="117" rx="7" ry="3"/>
    <ellipse cx="840" cy="118" rx="8" ry="4"/>
    <ellipse cx="870" cy="116" rx="7" ry="4"/>
  </g>

  <!-- Mound CLOSED/undisturbed -->
  <path d="M 700 118 Q 750 94 800 118" fill="#a07820" stroke="#7a5c10" stroke-width="1.5"/>
  <ellipse cx="750" cy="118" rx="52" ry="10" fill="#8B6914"/>

  <!-- Checkmark on mound -->
  <text x="750" y="112" text-anchor="middle" fill="#2d5a27" font-size="16" font-weight="bold">✓</text>

  <!-- Soil -->
  <rect x="610" y="128" width="280" height="130" fill="#8B5E3C"/>
  <g fill="#7a5030" opacity="0.4">
    <circle cx="630" cy="145" r="2"/><circle cx="670" cy="160" r="2"/><circle cx="720" cy="155" r="2"/>
    <circle cx="780" cy="148" r="2"/><circle cx="830" cy="165" r="2"/><circle cx="865" cy="145" r="2"/>
    <circle cx="645" cy="180" r="2"/><circle cx="695" cy="195" r="2"/><circle cx="755" cy="178" r="2"/>
    <circle cx="815" cy="185" r="2"/><circle cx="855" cy="175" r="2"/>
  </g>

  <!-- Small access hole (filled back in) -->
  <rect x="742" y="118" width="16" height="112" fill="#6b4423" opacity="0.7"/>

  <!-- Main tunnel run -->
  <rect x="610" y="228" width="280" height="18" fill="#2a1a0a"/>

  <!-- Victor Traps back to back in tunnel — same as step 2 -->
  <g transform="translate(700, 232)">
    <rect x="-28" y="0" width="28" height="8" fill="#c0392b" rx="1"/>
    <circle cx="-14" cy="4" r="5" fill="none" stroke="#888" stroke-width="2"/>
    <line x1="-28" y1="0" x2="-38" y2="-6" stroke="#888" stroke-width="2.5"/>
    <line x1="-28" y1="8" x2="-38" y2="14" stroke="#888" stroke-width="2.5"/>
    <rect x="-5" y="2" width="5" height="4" fill="#f39c12"/>
  </g>
  <g transform="translate(800, 232)">
    <rect x="0" y="0" width="28" height="8" fill="#c0392b" rx="1"/>
    <circle cx="14" cy="4" r="5" fill="none" stroke="#888" stroke-width="2"/>
    <line x1="28" y1="0" x2="38" y2="-6" stroke="#888" stroke-width="2.5"/>
    <line x1="28" y1="8" x2="38" y2="14" stroke="#888" stroke-width="2.5"/>
    <rect x="0" y="2" width="5" height="4" fill="#f39c12"/>
  </g>
  <line x1="700" y1="236" x2="800" y2="236" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="690" y="222" text-anchor="middle" fill="#f5c842" font-size="14">←</text>
  <text x="810" y="222" text-anchor="middle" fill="#f5c842" font-size="14">→</text>

  <!-- Mound stays closed label -->
  <text x="750" y="100" text-anchor="middle" fill="#1a3a16" font-size="10" font-weight="bold">Mound stays closed</text>
  <line x1="750" y1="102" x2="750" y2="108" stroke="#1a3a16" stroke-width="1"/>

  <!-- Caption -->
  <rect x="610" y="258" width="280" height="32" fill="#2d5a27"/>
  <text x="750" y="271" text-anchor="middle" fill="#f5f0e8" font-size="10">Mound stays closed — gopher never</text>
  <text x="750" y="284" text-anchor="middle" fill="#f5f0e8" font-size="10">knows you were there.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Divider lines between panels -->
  <line x1="300" y1="48" x2="300" y2="290" stroke="#2d5a27" stroke-width="3"/>
  <line x1="600" y1="48" x2="600" y2="290" stroke="#2d5a27" stroke-width="3"/>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="900" height="38" fill="#2d5a27"/>
  <text x="450" y="308" text-anchor="middle" fill="#f5c842" font-size="11" font-weight="bold">Mark's Secret: NO LIGHT visible in the tunnel after traps are set. Cover the hole completely.</text>
  <text x="450" y="322" text-anchor="middle" fill="#c8dfc4" font-size="10">howtokillgophers.com</text>

  <!-- Legend -->
  <rect x="0" y="328" width="900" height="32" fill="#f0ebe0"/>
  <rect x="20" y="338" width="14" height="10" fill="#c0392b" rx="1"/>
  <text x="40" y="348" fill="#333" font-size="10">Victor Pincer Trap</text>
  <rect x="150" y="338" width="14" height="10" fill="#f39c12" rx="1"/>
  <text x="170" y="348" fill="#333" font-size="10">Trigger Plate</text>
  <line x1="280" y1="343" x2="310" y2="343" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="320" y="348" fill="#333" font-size="10">Connecting Wire</text>
  <line x1="450" y1="343" x2="480" y2="343" stroke="#f5c842" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="490" y="348" fill="#333" font-size="10">Main Tunnel Run</text>
  <text x="640" y="348" fill="#333" font-size="10">← → = Trap facing direction</text>

  <!-- Outer border -->
  <rect x="1" y="1" width="898" height="418" fill="none" stroke="#2d5a27" stroke-width="2"/>

</svg>
