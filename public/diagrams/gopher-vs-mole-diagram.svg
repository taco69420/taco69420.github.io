<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440" role="img" aria-label="Side-by-side diagram comparing gopher and mole mound shapes, tunnel depth, and surface features">
  <defs>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,7 L7,1" fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowhead-red-up" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M1,7 L4,1 L7,7" fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L4,7 L7,1" fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowhead-blue-up" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M1,7 L4,1 L7,7" fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" fill="#fafaf8" rx="8"/>

  <!-- Divider -->
  <line x1="450" y1="16" x2="450" y2="424" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ===================== LEFT: GOPHER ===================== -->

  <!-- Header -->
  <rect x="30" y="16" width="390" height="38" fill="#fef2f2" rx="6"/>
  <text x="225" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#b91c1c" letter-spacing="1">GOPHER</text>

  <!-- Sky area -->
  <rect x="30" y="60" width="390" height="148" fill="#f0f9ff" rx="0"/>

  <!-- Subsurface soil fill -->
  <rect x="30" y="208" width="390" height="170" fill="#c9a86c" rx="0"/>

  <!-- Ground surface line -->
  <line x1="30" y1="208" x2="420" y2="208" stroke="#8a6320" stroke-width="2.5"/>

  <!-- Gopher mound: asymmetric fan/crescent — spreads LEFT from plug point -->
  <!-- Plug is off to the right side, mound fans left -->
  <path d="M 260 208 Q 240 200 210 188 Q 175 175 145 170 Q 115 168 100 176 Q 88 184 96 196 Q 108 206 135 208 Q 190 208 260 208 Z"
        fill="#d4a85a" stroke="#8a6320" stroke-width="1.5"/>

  <!-- Plug hole (right side of mound) -->
  <ellipse cx="263" cy="208" rx="9" ry="4.5" fill="#6b4a18"/>
  <text x="283" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#6b4a18" font-style="italic">plug</text>

  <!-- Deep tunnel — dashed, going down from plug -->
  <path d="M 263 213 Q 268 250 272 300 Q 274 335 268 358"
        stroke="#6b4a18" stroke-width="3" fill="none" stroke-dasharray="5,4" stroke-linecap="round"/>
  <ellipse cx="266" cy="360" rx="11" ry="5" fill="#6b4a18" opacity="0.55"/>

  <!-- Depth measurement arrow -->
  <line x1="340" y1="208" x2="340" y2="358" stroke="#b91c1c" stroke-width="1.5"
        marker-start="url(#arrowhead-red-up)" marker-end="url(#arrowhead-red)"/>
  <line x1="333" y1="208" x2="347" y2="208" stroke="#b91c1c" stroke-width="1.5"/>
  <line x1="333" y1="358" x2="347" y2="358" stroke="#b91c1c" stroke-width="1.5"/>
  <rect x="349" y="270" width="60" height="22" fill="white" rx="3" opacity="0.9"/>
  <text x="379" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b91c1c" font-weight="700">6–18 in.</text>

  <!-- Label: fan/crescent shape -->
  <line x1="160" y1="168" x2="160" y2="140" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="80" y="120" width="158" height="20" fill="white" rx="3" opacity="0.85"/>
  <text x="159" y="134" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#374151">Fan/crescent — plug off to side</text>

  <!-- Bottom info box -->
  <rect x="35" y="386" width="375" height="42" fill="#fef2f2" rx="5" stroke="#fca5a5"/>
  <text x="222" y="402" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#991b1b" font-weight="700">Herbivore — eats roots, bulbs, tubers</text>
  <text x="222" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#991b1b">Deep main run · gopher traps required</text>

  <!-- ===================== RIGHT: MOLE ===================== -->

  <!-- Header -->
  <rect x="480" y="16" width="390" height="38" fill="#eff6ff" rx="6"/>
  <text x="675" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8" letter-spacing="1">MOLE</text>

  <!-- Sky area -->
  <rect x="480" y="60" width="390" height="148" fill="#f0f9ff" rx="0"/>

  <!-- Subsurface soil fill -->
  <rect x="480" y="208" width="390" height="170" fill="#c9a86c" rx="0"/>

  <!-- Ground surface line with shallow ridge on right -->
  <path d="M 480 208 L 760 208 Q 770 202 778 208 Q 786 202 794 208 Q 802 202 810 208 Q 818 202 826 208 L 870 208"
        stroke="#8a6320" stroke-width="2.5" fill="none"/>
  <!-- Ridge fill -->
  <path d="M 760 208 Q 770 204 778 208 Q 786 204 794 208 Q 802 204 810 208 Q 818 204 826 208 L 826 212 L 760 212 Z"
        fill="#d4a85a" opacity="0.6"/>

  <!-- Symmetric dome mound -->
  <path d="M 620 208 Q 640 185 675 172 Q 710 185 730 208 Z"
        fill="#d4a85a" stroke="#8a6320" stroke-width="1.5"/>

  <!-- Plug hole (CENTER of mound) -->
  <ellipse cx="675" cy="208" rx="9" ry="4.5" fill="#6b4a18"/>
  <text x="690" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#6b4a18" font-style="italic">plug</text>

  <!-- Shallow tunnel — near surface, going left -->
  <path d="M 675 213 Q 672 228 650 232 Q 610 236 570 234 Q 545 233 530 232"
        stroke="#6b4a18" stroke-width="3" fill="none" stroke-dasharray="5,4" stroke-linecap="round"/>
  <ellipse cx="528" cy="232" rx="11" ry="5" fill="#6b4a18" opacity="0.55"/>

  <!-- Depth measurement arrow (short — shallow) -->
  <line x1="507" y1="208" x2="507" y2="232" stroke="#1d4ed8" stroke-width="1.5"
        marker-start="url(#arrowhead-blue-up)" marker-end="url(#arrowhead-blue)"/>
  <line x1="500" y1="208" x2="514" y2="208" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="500" y1="232" x2="514" y2="232" stroke="#1d4ed8" stroke-width="1.5"/>
  <rect x="466" y="213" width="38" height="20" fill="white" rx="3" opacity="0.9"/>
  <text x="485" y="226" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1d4ed8" font-weight="700">2–5 in.</text>

  <!-- Label: dome shape -->
  <line x1="675" y1="170" x2="675" y2="140" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="591" y="120" width="168" height="20" fill="white" rx="3" opacity="0.85"/>
  <text x="675" y="134" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#374151">Dome/volcano — plug in center</text>

  <!-- Label: surface ridge -->
  <line x1="793" y1="205" x2="793" y2="170" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="730" y="150" width="120" height="20" fill="white" rx="3" opacity="0.85"/>
  <text x="790" y="164" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#374151">Surface ridge trail</text>

  <!-- Bottom info box -->
  <rect x="485" y="386" width="375" height="42" fill="#eff6ff" rx="5" stroke="#93c5fd"/>
  <text x="672" y="402" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#1e40af" font-weight="700">Insectivore — eats grubs &amp; worms, not plants</text>
  <text x="672" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#1e40af">Shallow run · surface ridges visible · mole traps required</text>
</svg>
